
name: FreeBSD

on:
  workflow_dispatch

jobs:

  freebsd-native-build-run:
    runs-on: ubuntu-latest
    steps:

      - name: Build in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y python git meson ninja cmake
          run: |
            git clone https://github.com/fractal-programming/code-orb.git --recursive
            cd code-orb
            meson setup build-meson-native
            ninja -C build-meson-native -j$(nproc)
            ./build-meson-native/codeorb --help

